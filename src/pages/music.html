<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Searching for Lucet - Music</title>
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="/styles/cursors.css">
    <link href="https://fonts.googleapis.com/css2?family=Alice&display=swap" rel="stylesheet">
</head>
<body>

<div id="wrapper">
    <header>
        <h1>Searching for Lucet</h1>
    </header>

    <nav class="top-nav">
        <a href="/index.html">Home</a>
        <a href="/pages/about.html">About</a>
        <a href="/pages/blog.html">Blog</a>
        <a href="/pages/journal.html">Journal Entries</a>
        <a href="/pages/contact.html">Contact</a>
    </nav>

    <div class="main-container">
        <!-- Left Sidebar -->
        <aside class="column">
            <div class="box">
                <div class="box-header" id="second-nav">Navigation</div>
                <div class="box-content">
                    <ul class="nav-list">
                        <li><a href="/pages/blog.html">My Blog</a></li>
                        <li><a href="/pages/gallery.html">My Gallery</a></li>
                        <li><a href="/pages/music.html">My Music</a></li>
                        <li><a href="/pages/sitemap.html">Sitemap</a></li>
                    </ul>
                </div>
            </div>

            <div class="box">
                <div class="box-header">Update Log</div>
                <div id="update-log" class="box-content" style="height: 150px; overflow-y: auto;">
                    Loading updates...
                </div>
            </div>

            <div class="box">
                <div class="box-header">Music Player</div>
                <div class="box-content mini-player-content">
                    <div id="mini-track-info">
                        <marquee scrollamount="3" id="mini-track-title">Loading...</marquee>
                    </div>
                    <div class="mini-player-controls">
                        <button id="mini-prev-btn" class="mini-btn">⏮</button>
                        <button id="mini-play-pause-btn" class="mini-btn">▶</button>
                        <button id="mini-next-btn" class="mini-btn">⏭</button>
                    </div>
                    <div id="mini-playlist" class="mini-playlist-container"></div>
                </div>
            </div>
        </aside>

        <!-- Center Content -->
        <main id="main-content">
            <h2 id="page-title">Music</h2>
            <div id="page-body">
                <div id="retro-player">
                    <!-- Main Window -->
                    <div class="retro-main-window">
                        <div class="retro-title-bar">
                            <div class="retro-title-bar-text">RETRO PLAYER</div>
                            <div class="retro-title-bar-buttons">
                                <button class="retro-minimize">-</button>
                                <button class="retro-maximize">[]</button>
                                <button class="retro-close">X</button>
                            </div>
                        </div>
                        <div class="retro-content">
                            <div class="retro-display">
                                <div id="track-info" class="retro-track-info">
                                    <span id="track-title"></span> - <span id="track-artist"></span>
                                </div>
                                <div id="time-display" class="retro-time-display">00:00</div>
                            </div>
                            <div class="retro-controls">
                                <button id="prev-btn" class="retro-btn">⏮</button>
                                <button id="play-btn" class="retro-btn">▶</button>
                                <button id="pause-btn" class="retro-btn">⏸</button>
                                <button id="stop-btn" class="retro-btn">⏹</button>
                                <button id="next-btn" class="retro-btn">⏭</button>
                            </div>
                            <div class="retro-sliders">
                                <label>Volume</label>
                                <input id="volume-slider" type="range" min="0" max="100" value="100">
                                <div id="progress-container" class="retro-progress-container">
                                    <div id="progress-bar" class="retro-progress-bar"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- Playlist Window -->
                    <div class="retro-playlist-window">
                        <div class="retro-title-bar">
                            <div class="retro-title-bar-text">RETRO PLAYLIST</div>
                             <div class="retro-title-bar-buttons">
                                <button class="retro-minimize">-</button>
                                <button class="retro-maximize">[]</button>
                                <button class="retro-close">X</button>
                            </div>
                        </div>
                        <div id="playlist" class="retro-playlist-content">
                            <!-- Playlist items will be injected here by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Right Sidebar -->
        <aside class="column">
            <div class="box">
                <div class="box-content profile-box">
                    <!--Placeholder for homer's profile picture -->
                    <div id="profile-pic"><img src="/assets/images/webmaster.jpeg" alt=""></div>
                    <p class="bio-title"><strong>Anon/Webmaster</strong></p>
                    <div id="webmaster-desc">
                        Loading bio...
                    </div>
                </div>
            </div>

            <div class="box">
                <div class="box-header">Buttons</div>
                <div class="box-content button-container">
                    <button id="btn1" class="main-page-button"></button>
                    <button id="btn2" class="main-page-button"></button>
                    <button id="btn3" class="main-page-button"></button>
                    <button id="btn4" class="main-page-button"></button>
                </div>
            </div>
        </aside>
    </div>
</div>

<script type="module" src="/scripts/music-player.js"></script>
<script type="module" src="/scripts/mini-player.js"></script>

</body>
</html>
